<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<title>Đăng ký</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="login">

<h2>ĐĂNG KÝ</h2>

<input
type="text"
id="fullname"
placeholder="Họ tên">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Mật khẩu">

<input
type="password"
id="confirm"
placeholder="Nhập lại mật khẩu">

<button onclick="register()">

Đăng ký

</button>

<br><br>

<p style="text-align:center">

<a href="login.html">

Đã có tài khoản? Đăng nhập

</a>

</p>

</div>

<script src="js/auth.js"></script>

</body>

</html>
