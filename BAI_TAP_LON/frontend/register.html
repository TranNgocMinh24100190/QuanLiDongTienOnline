<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="container">

<div class="left">

<h1>Money Manager</h1>

<p>Tạo tài khoản để quản lý tài chính của bạn.</p>

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135768.png">

</div>

<div class="right">

<form id="registerForm">

<h2>Đăng ký</h2>

<div class="input-group">
<i class="fa-solid fa-user"></i>
<input type="text" id="fullname" placeholder="Họ và tên" required>
</div>

<div class="input-group">
<i class="fa-solid fa-envelope"></i>
<input type="email" id="email" placeholder="Email" required>
</div>

<div class="input-group">
<i class="fa-solid fa-lock"></i>
<input type="password" id="password" placeholder="Mật khẩu" required>
</div>

<div class="input-group">
<i class="fa-solid fa-lock"></i>
<input type="password" id="confirm" placeholder="Nhập lại mật khẩu" required>
</div>

<button type="submit">
Đăng ký
</button>

<div class="bottom">

Đã có tài khoản?

<a href="login.html">

Đăng nhập

</a>

</div>

</form>

</div>

</div>

<script src="js/register.js"></script>

</body>

</html>
